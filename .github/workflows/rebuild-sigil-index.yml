name: Rebuild sigil-index

# Runs automatically every day at 06:00 UTC.
# Can also be triggered manually from the Actions tab via "Run workflow".
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild sigil-index.json
        run: node build-sigil-index.js

      - name: Commit if changed
        run: |
          git config user.name  "sigil-index-bot"
          git config user.email "sigil-index-bot@users.noreply.github.com"
          git add sigil-index.json
          if git diff --cached --quiet; then
            echo "No changes in sigil-index.json, skipping commit."
          else
            TODAY=$(date -u +%Y-%m-%d)
            git commit -m "chore: auto-rebuild sigil-index ($TODAY) [skip ci]"
            git push
            echo "Committed and pushed updated sigil-index.json."
          fi
